name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

      - name: Check
        run: pnpm check

      - name: CLI smoke
        run: |
          node dist/cli.js init
          CONFAGENT_PASSPHRASE='correct horse battery staple' node dist/cli.js seal --name DEMO_TOKEN --value secret --out demo.sealed.json
          CONFAGENT_PASSPHRASE='correct horse battery staple' node dist/cli.js run --policy .confagent/policy.json --secret DEMO_TOKEN=demo.sealed.json --passphrase-env CONFAGENT_PASSPHRASE -- node -e "console.log('ok')"

      - name: Package smoke test
        run: npm pack --dry-run
